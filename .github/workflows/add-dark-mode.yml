name: Add automatic dark mode

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  add-dark-mode:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update generated site theme
        run: |
          node <<'JS'
          const fs = require('fs');

          const htmlFiles = [
            'index.html',
            'privacy.html',
            'privacy/index.html',
            'readme.html',
            'readme/index.html',
            'screenshots.html',
            'screenshots/index.html',
            'support.html',
            'support/index.html',
          ];

          for (const file of htmlFiles) {
            if (!fs.existsSync(file)) continue;
            let html = fs.readFileSync(file, 'utf8');
            if (!html.includes('name="color-scheme"')) {
              html = html.replace(
                '<meta name="viewport" content="width=device-width, initial-scale=1">',
                '<meta name="viewport" content="width=device-width, initial-scale=1"><meta name="color-scheme" content="light dark">'
              );
            }
            html = html
              .replace('<p class="kicker">iPhone</p><h2>iPhone</h2><p class="lead">', '<p class="kicker">iPhone</p><h2><span class="lang-fr">iPhone</span><span class="lang-en">iPhone</span></h2><p class="lead">')
              .replace('<p class="kicker">iPad</p><h2>iPad</h2><p class="lead">', '<p class="kicker">iPad</p><h2><span class="lang-fr">iPad</span><span class="lang-en">iPad</span></h2><p class="lead">')
              .replace('<p class="kicker">watchOS</p><h2>Apple Watch</h2><p class="lead">', '<p class="kicker">watchOS</p><h2><span class="lang-fr">Apple Watch</span><span class="lang-en">Apple Watch</span></h2><p class="lead">');
            fs.writeFileSync(file, html);
          }

          const markerStart = '/* recordpicker-theme:auto */';
          const markerEnd = '/* /recordpicker-theme:auto */';
          let css = fs.readFileSync('styles.css', 'utf8');
          const start = css.indexOf(markerStart);
          if (start !== -1) {
            const end = css.indexOf(markerEnd, start);
            if (end !== -1) {
              css = css.slice(0, start).trimEnd() + '\n' + css.slice(end + markerEnd.length).trimStart();
            }
          }

          const theme = [
            markerStart,
            ':root{color-scheme:light dark;--page:#ffffff;--header-bg:rgba(255,255,255,0.82);--glass-border:rgba(17,17,20,0.08);--glass-surface:rgba(255,255,255,0.68);--glass-strong:rgba(255,255,255,0.92);--glass-shadow:0 14px 36px rgba(17,17,20,0.07);--active-shadow:0 6px 16px rgba(17,17,20,0.07);--button-glass-bg:linear-gradient(180deg,rgba(255,255,255,0.88),rgba(245,245,247,0.72));--button-glass-shadow:0 14px 38px rgba(17,17,20,0.08);--frame-border:rgba(255,255,255,0.76);--frame-bg:rgba(245,245,247,0.58);--surface:#f5f5f7;--surface-raised:rgba(255,255,255,0.82);--surface-strong:#ffffff;--image-bg:#ffffff;--logo-shadow:0 10px 24px rgba(17,17,20,0.12);--primary-shadow:0 18px 44px rgba(255,45,85,0.26);--card-shadow:0 16px 40px rgba(17,17,20,0.04)}',
            'body{background:var(--page)}.site-header{background:var(--header-bg)}.brand img{box-shadow:var(--logo-shadow)}.lang-switch{border:1px solid var(--glass-border);background:var(--glass-surface);box-shadow:var(--glass-shadow);backdrop-filter:blur(22px) saturate(1.28)}body[data-lang="fr"] [data-set-lang="fr"],body[data-lang="en"] [data-set-lang="en"]{background:var(--glass-strong);box-shadow:var(--active-shadow)}.glass-pill,.badge-row span{border:1px solid var(--glass-border);background:var(--glass-surface);box-shadow:var(--glass-shadow)}.button.primary{box-shadow:var(--primary-shadow)}.button.glass{border-color:var(--glass-border);background:var(--button-glass-bg);box-shadow:var(--button-glass-shadow)}.device-frame{border:1px solid var(--frame-border);background:var(--frame-bg)}.facts-band div,.card,.policy-card,.video-card,.shot-card{background:var(--surface)}.card,.policy-card,.release-card,.screen-grid figure,.video-card,.shot-card{box-shadow:var(--card-shadow)}.release-card{background:var(--surface-raised)}.screen-grid figure,.footer{background:var(--surface-strong)}.shot-card img{background:var(--image-bg)}',
            '@media (prefers-color-scheme:dark){:root{--ink:#f5f5f7;--muted:#b6b6bd;--soft:#151518;--soft-2:#222226;--panel:rgba(24,24,28,0.74);--panel-solid:#151518;--line:rgba(255,255,255,0.13);--red:#ff3b5f;--red-dark:#ff6b84;--shadow:0 24px 70px rgba(0,0,0,0.45);--page:#08080a;--header-bg:rgba(8,8,10,0.82);--glass-border:rgba(255,255,255,0.12);--glass-surface:rgba(28,28,32,0.70);--glass-strong:rgba(36,36,40,0.92);--glass-shadow:0 14px 38px rgba(0,0,0,0.30);--active-shadow:0 6px 16px rgba(0,0,0,0.24);--button-glass-bg:linear-gradient(180deg,rgba(36,36,40,0.90),rgba(20,20,23,0.76));--button-glass-shadow:0 14px 38px rgba(0,0,0,0.32);--frame-border:rgba(255,255,255,0.13);--frame-bg:rgba(22,22,25,0.70);--surface:#151518;--surface-raised:rgba(28,28,32,0.88);--surface-strong:#1c1c20;--image-bg:#101013;--logo-shadow:0 10px 24px rgba(0,0,0,0.36);--primary-shadow:0 18px 44px rgba(255,45,85,0.22);--card-shadow:0 16px 40px rgba(0,0,0,0.24)}}',
            markerEnd,
          ].join('\n');
          css = css.trimEnd() + '\n' + theme + '\n';
          fs.writeFileSync('styles.css', css);
          fs.rmSync('.github/workflows/add-dark-mode.yml', { force: true });
          JS
      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No dark mode changes to commit."
            exit 0
          fi
          git commit -m "Add automatic dark mode"
          git push
