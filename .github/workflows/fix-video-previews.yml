name: Fix video preview cards

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  fix-video-previews:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Replace native video controls with preview cards
        run: |
          node <<'JS'
          const fs = require('fs');

          const videos = {
            'https://apptrailers.itunes.apple.com/itunes-assets/PurpleVideo211/v4/79/b7/a2/79b7a21a-12f8-c450-b8b8-dfe3c4db1f49/P1412267326_default.m3u8': {
              fr: 'Aperçu iPhone',
              en: 'iPhone preview',
            },
            'https://apptrailers.itunes.apple.com/itunes-assets/PurpleVideo211/v4/b3/4d/df/b34ddf82-47c4-140e-b140-7f5b4e8e4201/P1412267948_default.m3u8': {
              fr: 'Aperçu du bac',
              en: 'Bin preview',
            },
          };

          let html = fs.readFileSync('screenshots/index.html', 'utf8');
          html = html.replace(/<video controls playsinline preload="metadata" poster="([^"]+)"><source src="([^"]+)" type="application\/vnd\.apple\.mpegurl"><\/video>/g, (match, poster, src) => {
            const meta = videos[src] || { fr: 'Aperçu vidéo', en: 'Video preview' };
            return '<a class="video-preview" href="' + src + '" aria-label="Ouvrir ' + meta.fr + ' / Open ' + meta.en + '"><img loading="lazy" alt="' + meta.en + '" src="' + poster + '"><span class="video-play" aria-hidden="true"></span></a>';
          });
          fs.writeFileSync('screenshots/index.html', html);

          const markerStart = '/* recordpicker-video-preview-cards */';
          const markerEnd = '/* /recordpicker-video-preview-cards */';
          let css = fs.readFileSync('styles.css', 'utf8');
          const existingStart = css.indexOf(markerStart);
          if (existingStart !== -1) {
            const existingEnd = css.indexOf(markerEnd, existingStart);
            if (existingEnd !== -1) {
              css = css.slice(0, existingStart).trimEnd() + '\n' + css.slice(existingEnd + markerEnd.length).trimStart();
            }
          }
          const block = [
            markerStart,
            '.video-preview{position:relative;display:block;width:100%;aspect-ratio:9 / 19.5;border-radius:6px;background:var(--soft-2);overflow:hidden}.video-preview img{width:100%;height:100%;object-fit:cover}.video-play{position:absolute;right:14px;bottom:14px;display:grid;place-items:center;width:48px;height:48px;border-radius:999px;background:var(--red);box-shadow:var(--primary-shadow)}.video-play::before{content:"";width:0;height:0;margin-left:4px;border-top:10px solid transparent;border-bottom:10px solid transparent;border-left:15px solid white}',
            markerEnd,
          ].join('\n');
          css = css.trimEnd() + '\n' + block + '\n';
          fs.writeFileSync('styles.css', css);

          fs.rmSync('.github/workflows/fix-video-previews.yml', { force: true });
          JS
      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No video preview changes to commit."
            exit 0
          fi
          git commit -m "Remove native video controls from previews"
          git push
