name: Fix glass button styles

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  fix-glass-buttons:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update glass CSS
        run: |
          node <<'JS'
          const fs = require('fs');
          const path = 'styles.css';
          let css = fs.readFileSync(path, 'utf8');

          css = css.replace(
            '.lang-switch{display:grid;grid-template-columns:1fr 1fr;gap:4px;border:1px solid rgba(255,255,255,0.72);border-radius:999px;background:rgba(245,245,247,0.76);box-shadow:inset 0 1px 0 rgba(255,255,255,0.86),0 12px 36px rgba(17,17,20,0.08);padding:4px}',
            '.lang-switch{display:grid;grid-template-columns:1fr 1fr;gap:4px;border:1px solid rgba(17,17,20,0.08);border-radius:999px;background:rgba(255,255,255,0.66);box-shadow:0 12px 32px rgba(17,17,20,0.07);backdrop-filter:blur(22px) saturate(1.28);padding:4px}'
          );
          css = css.replace(
            'body[data-lang="fr"] [data-set-lang="fr"],body[data-lang="en"] [data-set-lang="en"]{background:white;color:var(--red);box-shadow:0 8px 20px rgba(17,17,20,0.08)}',
            'body[data-lang="fr"] [data-set-lang="fr"],body[data-lang="en"] [data-set-lang="en"]{background:rgba(255,255,255,0.92);color:var(--red);box-shadow:0 6px 16px rgba(17,17,20,0.07)}'
          );
          css = css.replace(
            '.glass-pill,.badge-row span{display:inline-flex;align-items:center;border:1px solid rgba(255,255,255,0.78);border-radius:999px;background:rgba(245,245,247,0.68);box-shadow:inset 0 1px 0 rgba(255,255,255,0.86),0 16px 46px rgba(17,17,20,0.08);backdrop-filter:blur(22px) saturate(1.35)}',
            '.glass-pill,.badge-row span{display:inline-flex;align-items:center;border:1px solid rgba(17,17,20,0.08);border-radius:999px;background:rgba(255,255,255,0.68);box-shadow:0 14px 36px rgba(17,17,20,0.07);backdrop-filter:blur(22px) saturate(1.28)}'
          );
          css = css.replace(
            '.button.glass{border-color:rgba(255,255,255,0.78);background:rgba(245,245,247,0.78);color:var(--ink);box-shadow:inset 0 1px 0 rgba(255,255,255,0.86),0 16px 46px rgba(17,17,20,0.08);backdrop-filter:blur(22px) saturate(1.35)}',
            '.button.glass{border-color:rgba(17,17,20,0.08);background:linear-gradient(180deg,rgba(255,255,255,0.88),rgba(245,245,247,0.72));color:var(--ink);box-shadow:0 14px 38px rgba(17,17,20,0.08);backdrop-filter:blur(22px) saturate(1.28)}'
          );

          fs.writeFileSync(path, css);
          fs.rmSync('.github/workflows/fix-glass-buttons.yml', { force: true });
          JS
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add styles.css .github/workflows/fix-glass-buttons.yml
          if git diff --cached --quiet; then
            echo "No glass button style changes to commit."
            exit 0
          fi
          git commit -m "Refine glass button styling"
          git push
