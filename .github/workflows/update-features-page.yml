name: Update features page

on:
  push:
    paths:
      - .github/workflows/update-features-page.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply features page update
        run: node .github/scripts/update-features-page.js
      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md index.html support/index.html privacy/index.html screenshots/index.html readme/index.html readme.html styles.css .github/workflows/update-features-page.yml .github/scripts/update-features-page.js
          git commit -m "Rename guide page to features"
          git push
