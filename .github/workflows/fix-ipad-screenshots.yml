name: Fix iPad screenshots

on:
  push:
    paths:
      - .github/workflows/fix-ipad-screenshots.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove dimmed iPad screenshots
        run: |
          node <<'NODE'
          const fs = require('fs');
          const page = 'screenshots/index.html';
          let html = fs.readFileSync(page, 'utf8');
          html = html.replace(
            'Des vues plus larges pour le bac, les filtres, les détails et les outils.',
            'Des vues plus larges pour le tirage, le bac et les filtres.',
          );
          html = html.replace(
            'Wider views for the bin, filters, details, and tools.',
            'Wider views for the draw, bin, and filters.',
          );
          const captions = [
            'Détails et exclusions',
            'Collection en grille',
            'Statistiques',
            'Illustrations et outils',
          ];
          for (const caption of captions) {
            const escaped = caption.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const pattern = new RegExp(
              `<figure class="shot-card ipad"><img[^>]+><figcaption><span class="lang-fr">${escaped}</span><span class="lang-en">[^<]+</span></figcaption></figure>`,
              'g',
            );
            html = html.replace(pattern, '');
          }
          fs.writeFileSync(page, html);
          fs.unlinkSync('.github/workflows/fix-ipad-screenshots.yml');
          NODE
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add screenshots/index.html .github/workflows/fix-ipad-screenshots.yml
          git commit -m "Remove dimmed iPad screenshots"
          git push
