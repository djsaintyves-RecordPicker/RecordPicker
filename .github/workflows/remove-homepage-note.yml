name: Remove homepage note

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0
      - name: Remove obsolete homepage note
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          index = Path("index.html")
          html = index.read_text(encoding="utf-8")
          html = re.sub(r'<p class="hero-note">.*?</p>', '', html)
          index.write_text(html, encoding="utf-8")

          styles = Path("styles.css")
          css = styles.read_text(encoding="utf-8")
          css = re.sub(r'\.hero-note\{[^}]*\}', '', css)
          styles.write_text(css, encoding="utf-8")

          workflow = Path(".github/workflows/remove-homepage-note.yml")
          if workflow.exists():
              workflow.unlink()
          PY
      - name: Commit cleanup
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html styles.css .github/workflows/remove-homepage-note.yml
            git commit -m "Remove homepage update note from markup"
            git push
          fi
