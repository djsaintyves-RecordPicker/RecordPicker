name: Fix previews labels and video lightbox

on:
  push:
    paths:
      - .github/workflows/fix-previews-lightbox.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update previews labels and video playback
        run: node .github/scripts/fix-previews-lightbox.js
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html support/index.html privacy/index.html readme/index.html screenshots/index.html screenshots.html site.js styles.css .github/workflows/fix-previews-lightbox.yml .github/scripts/fix-previews-lightbox.js
          git commit -m "Rename previews and embed video playback"
          git push
